services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: smartfound
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASS:-smartfound_secure_pass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: smartfound-backend:latest
    restart: always
    environment:
      - APP_ENV=production
      - APP_SECRET=${APP_SECRET:-change_this_to_a_long_random_secret_string}
      - APP_URL=${APP_URL:-http://localhost:8080}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smartfound
      - DB_USER=postgres
      - DB_PASS=${DB_PASS:-smartfound_secure_pass}
      - UPLOAD_DIR=uploads
      - MAX_FILE_SIZE=2097152
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
    volumes:
      - backend-uploads:/var/www/html/uploads
    ports:
      - "8080:80"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    image: smartfound-frontend:latest
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend-uploads:
    driver: local
  postgres-data:
    driver: local
