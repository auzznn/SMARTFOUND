services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: smartfound-backend:latest
    restart: always
    environment:
      - APP_ENV=production
      - APP_SECRET=${APP_SECRET}
      - APP_URL=${APP_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - UPLOAD_DIR=uploads
      - MAX_FILE_SIZE=2097152
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
    volumes:
      - backend-uploads:/var/www/html/uploads
    # Ports will be managed by Dokploy/Traefik routing or mapped directly if needed
    ports:
      - "8080:80"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    image: smartfound-frontend:latest
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend-uploads:
    driver: local
